services:
  # Backend API FastAPI
  - type: web
    name: comebuy-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python create_tables_and_seed.py && python seed_produits.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: comebuy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      - key: DEBUG
        value: false

databases:
  # Base de données PostgreSQL
  - name: comebuy-db
    databaseName: comebuy
    user: comebuy
    region: frankfurt
    plan: free
