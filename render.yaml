services:
  # Backend API FastAPI
  - type: web
    name: comebuy-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false  # Coller ici l'URL Neon : postgresql://user:pass@host/db?sslmode=require
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      - key: DEBUG
        value: false
      # ── NotchPay Mobile Money (MTN MoMo / Orange Money) ──
      # Obtenir sur https://business.notchpay.co → Settings → API Keys
      - key: NOTCHPAY_PUBLIC_KEY
        sync: false
      - key: NOTCHPAY_SANDBOX
        value: false
      # ── Infobip SMS (confirmation commandes) ──
      # Obtenir sur https://portal.infobip.com → API Keys
      - key: INFOBIP_API_KEY
        sync: false
      - key: INFOBIP_BASE_URL
        sync: false
      - key: SMS_SENDER
        value: MarcheCM
      # ── Resend API (méthode principale — fonctionne sur Render free) ──
      # Créer un compte gratuit sur https://resend.com → API Keys
      - key: RESEND_API_KEY
        sync: false  # ← Coller ici la clé API Resend
      # ── Email Gmail SMTP (fallback) ──
      - key: GMAIL_USER
        value: comebuy237@gmail.com
      - key: GMAIL_APP_PASSWORD
        sync: false
      # Email admin ComeBuy
      - key: COMEBUY_ADMIN_EMAIL
        value: comebuy237@gmail.com
      # ── CodingMailer (fallback si Gmail SMTP échoue) ──
      - key: CODINGMAILER_URL
        value: https://codingmailer.onrender.com/send-email

# Base de données hébergée sur Neon.tech (gratuit)
# Ajouter DATABASE_URL manuellement dans les env vars Render
