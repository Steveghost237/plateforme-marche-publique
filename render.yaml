services:
  # Backend API FastAPI
  - type: web
    name: comebuy-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python create_tables_and_seed.py && python seed_produits.py && python update_boissons_images.py && python update_menus_images_v2.py && python update_fruits_epices_images.py && python update_boulangerie_images.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: comebuy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      - key: DEBUG
        value: false
      # ── NotchPay Mobile Money (MTN MoMo / Orange Money) ──
      # Obtenir sur https://business.notchpay.co → Settings → API Keys
      - key: NOTCHPAY_PUBLIC_KEY
        sync: false
      - key: NOTCHPAY_SANDBOX
        value: false
      # ── Infobip SMS (confirmation commandes) ──
      # Obtenir sur https://portal.infobip.com → API Keys
      - key: INFOBIP_API_KEY
        sync: false
      - key: INFOBIP_BASE_URL
        sync: false
      - key: SMS_SENDER
        value: MarcheCM

databases:
  # Base de données PostgreSQL
  - name: comebuy-db
    databaseName: comebuy
    user: comebuy
    region: frankfurt
    plan: free
